# THEME
include themes/coolnight.conf
background_opacity 0.8

# FONT
font_family JetBrains Mono Nerd Font
font_size 12
confirm_os_window_close 0

# TABS
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style round
tab_title_template "{title} {index}"


# Onglet actif
active_tab_foreground   #011423
active_tab_background   #44FFB1
active_tab_font_style   bold

# Onglets inactifs
inactive_tab_foreground #CBE0F0
inactive_tab_background #214969
inactive_tab_font_style normal

# Barre elle-même
tab_bar_background      #011423